name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build plugin zip
        run: |
          mkdir -p /tmp/webshake-consent-manager
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='CLAUDE.md' \
            . /tmp/webshake-consent-manager/
          mkdir -p dist
          cd /tmp
          zip -r "$GITHUB_WORKSPACE/dist/webshake-consent-manager-${{ steps.version.outputs.version }}.zip" webshake-consent-manager/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: dist/webshake-consent-manager-${{ steps.version.outputs.version }}.zip
